name: Build Windows desktop app with manual data input

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "patch_manual_data_input.py"
      - ".github/workflows/build-windows-manual-input.yml"
      - "desktop_app/**"
      - "cp_sat_scheduler.py"
      - "FactoryScheduler.spec"
      - "run_desktop_app.py"
      - "requirements.txt"
      - "requirements_desktop.txt"
      - "generated_factory_demo_data/**"

jobs:
  build-windows-manual-input:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m pip install -r requirements_desktop.txt
          python -m pip install pyinstaller

      - name: Apply manual data-input patch
        run: python patch_manual_data_input.py

      - name: Build Windows application
        run: pyinstaller FactoryScheduler.spec

      - name: Create ZIP archive
        shell: pwsh
        run: |
          Compress-Archive -Path dist\FactoryScheduler\* -DestinationPath FactoryScheduler-Windows-ManualInput.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: FactoryScheduler-Windows-ManualInput
          path: FactoryScheduler-Windows-ManualInput.zip
