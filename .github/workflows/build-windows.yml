name: Build Windows desktop app

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements_desktop.txt
          python -m pip install pyinstaller

      - name: Build executable
        run: python -m PyInstaller --noconfirm --clean FactoryScheduler.spec

      - name: Package Windows app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Compress-Archive -Path dist/FactoryScheduler/* -DestinationPath release/FactoryScheduler-Windows.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FactoryScheduler-Windows
          path: release/FactoryScheduler-Windows.zip

      - name: Publish GitHub Release for version tags
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" "release/FactoryScheduler-Windows.zip" --title "${{ github.ref_name }}" --notes "Windows desktop build of FactoryScheduler." --latest
